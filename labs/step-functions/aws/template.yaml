AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Unifor — Order workflow (Step Functions + Lambda)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Resources:
  ValidateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/validate/
      Handler: handler.lambda_handler

  ProcessPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/payment/
      Handler: handler.lambda_handler

  SendNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/notify/
      Handler: handler.lambda_handler

  OrderStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: state-machine.asl.json
      DefinitionSubstitutions:
        ValidateOrderArn: !GetAtt ValidateOrderFunction.Arn
        ProcessPaymentArn: !GetAtt ProcessPaymentFunction.Arn
        SendNotificationArn: !GetAtt SendNotificationFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref ValidateOrderFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ProcessPaymentFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SendNotificationFunction

Outputs:
  StateMachineArn:
    Value: !Ref OrderStateMachine
