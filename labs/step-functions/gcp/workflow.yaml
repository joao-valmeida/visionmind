# Substitua VALIDATE_URL, PAYMENT_URL, NOTIFY_URL pelas URLs das Cloud Functions após deploy.
main:
  params: [input]
  steps:
    - validate:
        call: http.post
        args:
          url: VALIDATE_URL
          auth:
            type: OIDC
          body: ${input}
        result: validated
    - payment:
        call: http.post
        args:
          url: PAYMENT_URL
          auth:
            type: OIDC
          body: ${validated.body}
        result: paid
        retry:
          max_retries: 2
          backoff:
            initial_delay: 2
            max_delay: 10
            multiplier: 2
    - notify:
        call: http.post
        args:
          url: NOTIFY_URL
          auth:
            type: OIDC
          body: ${paid.body}
        result: notification
    - done:
        return: ${notification.body}
