# Cluster Kind — Serverless Pós-Unifor
# Kubernetes 1.36 — 1 control-plane + 3 workers
#
# ANTES DE CRIAR O CLUSTER, substitua:
#   IP-A-ALTERAR              → IP do host (ex. 192.168.56.10 ou 0.0.0.0)
#   PORTA-KUBE-API-A-ALTERAR  → porta da API no host (ex. 6443)
#   PORTA-ISTIO-HTTP-A-ALTERAR → porta HTTP Istio no host (ex. 8080)
#
# kind create cluster --name serverless-unifor --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: serverless-unifor

networking:
  # API server no host — NÃO repetir 6443 em extraPortMappings (conflito de porta)
  apiServerAddress: "IP-A-ALTERAR"
  apiServerPort: PORTA-KUBE-API-A-ALTERAR

nodes:
  - role: control-plane
    image: kindest/node:v1.36.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP — Istio ingress (mapeia host → :80 do nó; ver cluster/istio/README.md)
      - containerPort: 80
        hostPort: PORTA-ISTIO-HTTP-A-ALTERAR
        listenAddress: "IP-A-ALTERAR"
        protocol: TCP

  - role: worker
    image: kindest/node:v1.36.0

  - role: worker
    image: kindest/node:v1.36.0

  - role: worker
    image: kindest/node:v1.36.0
