service: exercicio1-api

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
          Resource: !GetAtt ItemsTable.Arn

functions:
  items:
    handler: lambda_function.lambda_handler
    events:
      - http:
          path: items
          method: post
      - http:
          path: items
          method: get
    environment:
      DYNAMODB_TABLE: !Ref ItemsTable

resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-table
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
