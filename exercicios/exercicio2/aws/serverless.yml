service: exercicio2-event-driven

provider:
  name: aws
  runtime: python3.9
  region: us-east-1

functions:
  processor:
    handler: lambda_function.lambda_handler
    events:
      - eventBridge:
          eventBus: default
          pattern:
            source:
              - aws.s3
            detail-type:
              - Object Created
            detail:
              bucket:
                name:
                  - !Ref UploadBucket

resources:
  Resources:
    UploadBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-uploads-${aws:accountId}
        NotificationConfiguration:
          EventBridgeConfiguration:
            EventBridgeEnabled: true
