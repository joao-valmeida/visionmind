AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Infrastructure for Exercise 3 (SQS + Lambda + Aurora Serverless)

Resources:
  MessageQueue:
    Type: AWS::SQS::Queue

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      CodeUri: ./
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MessageQueue.Arn
      Environment:
        Variables:
          DB_HOST: "aurora-endpoint"
          DB_NAME: "mydb"

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG for Lambda in VPC
      VpcId: !Ref VPC

  # Note: Subnets and VPC are assumed to exist or be created here
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
