name: Exercicio 1 Azure Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a ser executada (deploy ou remove)'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - remove

permissions:
  contents: read 
  id-token: write

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      - name: Install test dependencies
        working-directory: exercicios/exercicio1/azure
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run tests
        working-directory: exercicios/exercicio1/azure
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install SLS Dependencies
        working-directory: exercicios/exercicio1/azure
        run: npm install

      - name: Register Azure Resource Providers
        run: |
          az provider register --namespace 'microsoft.insights'
          az provider register --namespace 'microsoft.operationalinsights'

      - name: Serverless Deploy/Remove
        working-directory: exercicios/exercicio1/azure
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx serverless ${{ github.event.inputs.action }}
